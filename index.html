<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movilog - Film & Dizi Dünyası</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="logo" style="cursor: pointer;">🎬 Movilog</h1>
        <div class="nav-controls">
            <input type="text" id="search" placeholder="Film veya dizi ara...">
            <button id="profile-btn" class="hidden">Profilim</button>
            <button id="logout-btn" class="hidden">Çıkış Yap</button>
            <button id="auth-nav-btn">Giriş Yap / Kayıt Ol</button>
        </div>
    </header>

    <main>
        <div id="movies-container"></div>

        <div id="auth-view" class="hidden">
            <div class="auth-container">
                <div class="auth-tabs">
                    <button id="tab-login" class="auth-tab active">Giriş Yap</button>
                    <button id="tab-register" class="auth-tab">Kayıt Ol</button>
                </div>
                
                <form id="login-form" class="auth-form">
                    <input type="text" id="login-username" placeholder="Kullanıcı Adı" required>
                    <input type="password" id="login-password" placeholder="Şifre" required>
                    <button type="submit">Giriş Yap</button>
                </form>

                <form id="register-form" class="auth-form hidden">
                    <input type="text" id="register-username" placeholder="Kullanıcı Adı" required>
                    <input type="password" id="register-password" placeholder="Şifre" required>
                    <button type="submit">Kayıt Ol</button>
                </form>
                <p id="auth-message" style="text-align: center; margin-top: 15px; color: #ec4899; font-size: 14px;"></p>
            </div>
        </div>

        <div id="details-view" class="hidden">
            <button id="back-btn">← Ana Sayfaya Dön</button>
            <div class="content-split">
                <div class="poster-side">
                    <img id="detail-poster" src="" alt="">
                </div>
                <div class="info-side">
                    <h2 id="detail-title"></h2>
                    <p id="detail-movilog-rating"></p>
                    <button id="favorite-btn" class="hidden">🤍 Favorilere Ekle</button>
                    <p id="detail-overview"></p>
                    
                    <div id="tv-spec-area" class="hidden">
                        <hr>
                        <h3>Sezon ve Bölüm Seçimi</h3>
                        <div class="tv-selectors">
                            <select id="season-select">
                                <option value="">Sezon Seçiniz</option>
                            </select>
                            <select id="episode-select" disabled>
                                <option value="">Önce Sezon Seçiniz</option>
                            </select>
                        </div>
                    </div>

                    <hr>
                    
                    <div id="review-area">
                        <h3>Yorum Yap ve Puanla</h3>
                        <form id="review-form">
                            <select id="user-rating" required>
                                <option value="">Puan Seçin</option>
                                <option value="5">⭐⭐⭐⭐⭐ (5)</option>
                                <option value="4.5">⭐⭐⭐⭐🌗 (4.5)</option>
                                <option value="4">⭐⭐⭐⭐ (4)</option>
                                <option value="3.5">⭐⭐⭐🌗 (3.5)</option>
                                <option value="3">⭐⭐⭐ (3)</option>
                                <option value="2.5">⭐⭐🌗 (2.5)</option>
                                <option value="2">⭐⭐ (2)</option>
                                <option value="1.5">⭐🌗 (1.5)</option>
                                <option value="1">⭐ (1)</option>
                                <option value="0.5">🌗 (0.5)</option>
                            </select>
                            <label style="display:block; margin: 10px 0 5px 0; color: #aaa; font-size: 14px;">İzlediğiniz Tarih:</label>
                            <input type="date" id="watch-date" required style="width:100%; margin-bottom:10px;">
                            <textarea id="user-comment" placeholder="Bu içerik hakkındaki düşünceleriniz..." required></textarea>
                            <button type="submit">Gönder</button>
                        </form>
                    </div>
                    <div id="review-guest-message" class="hidden">
                        <p style="color: #a78bfa; font-size: 16px; font-weight: 500;">Yorum yapmak ve puanlamak için lütfen giriş yapın.</p>
                    </div>

                    <h3 style="margin-top: 30px;">Kullanıcı Yorumları</h3>
                    <div id="comments-list"></div>
                </div>
            </div>
        </div>

        <div id="profile-view" class="hidden">
            <button id="profile-back-btn">← Ana Sayfaya Dön</button>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 class="view-title" id="profile-title">Profilim</h2>
                <button id="add-friend-btn" class="hidden">Arkadaş Ekle</button>
            </div>
            
            <div class="profile-layout">
                <div class="profile-main-content">
                    <div id="profile-favorites-section" style="margin-bottom: 40px;">
                        <h3>Favori Dizi ve Filmler</h3>
                        <div id="profile-favorites-list" class="favorites-grid"></div>
                    </div>
                    <h3>Puanlanan ve Yorumlanan İçerikler</h3>
                    <div id="profile-reviews-list"></div>
                </div>
                <div class="profile-sidebar" id="profile-friends-section">
                    <h3>Arkadaşlar (<span id="friend-count">0</span>)</h3>
                    <div id="profile-friends-list"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
